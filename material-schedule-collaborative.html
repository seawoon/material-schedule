<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材料表管理系统 - 多人协作版</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.dark {
            background: #000;
            color: #f5f5f7;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-right: 0.5px solid rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .dark .sidebar {
            background: rgba(28, 28, 30, 0.72);
            border-right: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e5e5;
        }

        .dark .sidebar-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .user-info {
            font-size: 12px;
            color: #666;
        }

        .dark .user-info {
            color: #98989d;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .dark .toolbar {
            background: rgba(28, 28, 30, 0.72);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: #1d1d1f;
        }

        .dark .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f5f5f7;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 18px;
        }

        .dark .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }

        .dark .status-indicator {
            color: #98989d;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #34c759;
        }

        .status-dot.offline {
            background: #ff3b30;
        }

        .table-container {
            flex: 1;
            overflow: auto;
            background: #fff;
            margin: 20px;
            border-radius: 12px;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .dark .table-container {
            background: #1c1c1e;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            background: #f5f5f7;
            z-index: 10;
        }

        .dark thead {
            background: #2c2c2e;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: #86868b;
            border-bottom: 0.5px solid #e5e5e5;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dark th {
            color: #98989d;
            border-bottom: 0.5px solid #2c2c2e;
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 0.5px solid #f0f0f0;
        }

        .dark td {
            border-bottom: 0.5px solid #2c2c2e;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .dark tr:hover {
            background: #2c2c2e;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>材料管理</h1>
                <div class="user-info" id="userInfo">登录中...</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="toolbar">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">连接中...</span>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
                <button class="btn btn-primary" onclick="logout()">登出</button>
            </div>

            <div class="table-container">
                <div class="loading" id="loading">加载中...</div>
                <table id="materialTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>材料名称</th>
                            <th>品牌</th>
                            <th>状态</th>
                            <th>修改人</th>
                            <th>修改时间</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        if (window.supabaseInitialized) {
            console.log('Already initialized');
        } else {
            window.supabaseInitialized = true;

            const SUPABASE_URL = 'https://twvytxplhullonxkifba.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dnl0eHBsaHVsbG9ueGtpZmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTk0MjgsImV4cCI6MjA5MDAzNTQyOH0.5wVZin8TObqhDhrxZG3-31cmkh0erLrOT-tGxBNC1cQ';

            const { createClient } = window.supabase;
            const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

            let currentUser = null;
            let materials = [];
            let subscription = null;

            async function init() {
                document.getElementById('userInfo').textContent = '游客模式';
                loadMaterials();
                subscribeToChanges();
            }

            async function checkAuth() {
                // 简化版：跳过认证
                return true;
            }

            function showLoginForm() {
                const email = prompt('请输入邮箱地址：');
                if (email) {
                    document.getElementById('loading').textContent = '发送验证码中...';
                    supabase.auth.signInWithOtp({ email }).then(({ error }) => {
                        if (error) {
                            alert('发送失败: ' + error.message);
                            document.getElementById('loading').textContent = '加载中...';
                            return;
                        }
                        alert('验证码已发送到邮箱，请检查邮件');
                        const code = prompt('请输入验证码：');
                        if (code) {
                            supabase.auth.verifyOtp({ email, token: code, type: 'email' }).then(({ error }) => {
                                if (error) {
                                    alert('验证失败: ' + error.message);
                                    showLoginForm();
                                    return;
                                }
                                init();
                            });
                        }
                    }).catch(err => {
                        alert('错误: ' + err.message);
                        document.getElementById('loading').textContent = '加载中...';
                    });
                }
            }

            async function loadMaterials() {
                try {
                    const { data, error } = await supabase
                        .from('materials')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        throw error;
                    }

                    materials = data || [];
                    renderTable();
                } catch (err) {
                    console.error('加载失败:', err);
                    document.getElementById('loading').innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
                }
            }

            function subscribeToChanges() {
                subscription = supabase
                    .channel('materials')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'materials' }, (payload) => {
                        loadMaterials();
                    })
                    .subscribe();
            }

            function renderTable() {
                const tbody = document.getElementById('tableBody');
                const table = document.getElementById('materialTable');
                const loading = document.getElementById('loading');

                tbody.innerHTML = materials.map((item, idx) => `
                    <tr>
                        <td>${idx + 1}</td>
                        <td>${item.material_name_cn || '-'}</td>
                        <td>${item.brand || '-'}</td>
                        <td>${item.status || '草稿'}</td>
                        <td>${item.updated_by || '-'}</td>
                        <td>${new Date(item.updated_at).toLocaleString('zh-CN')}</td>
                    </tr>
                `).join('');

                loading.style.display = 'none';
                table.style.display = 'table';
            }

            function toggleTheme() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            }

            async function logout() {
                await supabase.auth.signOut();
                location.reload();
            }

            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }

            init();
        }
    </script>
</body>
</html>
