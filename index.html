<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目选择 - Cube Architecture</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #f5f5f7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease;
        }

        body.light {
            background: #fff;
            color: #1d1d1f;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        body.light .nav {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
        }

        .nav-brand {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .theme-toggle {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 40px 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 80px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 21px;
            color: #86868b;
            font-weight: 400;
        }

        body.light .hero p {
            color: #6e6e73;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: visible;
            margin-bottom: 32px;
        }

        body.light .projects-list {
            background: rgba(0, 0, 0, 0.05);
        }

        .project-row {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 28px 32px;
            display: grid;
            grid-template-columns: 40px 80px 1fr 140px 40px 60px;
            gap: 24px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            z-index: 1;
        }

        .drag-handle {
            cursor: grab;
            font-size: 20px;
            color: #86868b;
            user-select: none;
            touch-action: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .project-row.dragging {
            opacity: 0.5;
            background: rgba(0, 122, 255, 0.1) !important;
        }

        .project-row.drag-over {
            border-top: 2px solid #007aff;
        }

        .project-row:has(.dropdown-menu.active) {
            z-index: 10001;
        }

        body.light .project-row {
            background: #fff;
        }

        .project-row:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.005);
        }

        body.light .project-row:hover {
            background: #f5f5f7;
        }

        .project-no {
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            font-variant-numeric: tabular-nums;
        }

        .project-info h3 {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .project-info p {
            font-size: 14px;
            color: #86868b;
            line-height: 1.4;
        }

        body.light .project-info p {
            color: #6e6e73;
        }

        .project-date {
            font-size: 14px;
            color: #86868b;
            font-variant-numeric: tabular-nums;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .edit-btn {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            color: #f5f5f7;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        body.light .edit-btn {
            background: rgba(0, 0, 0, 0.05);
            color: #1d1d1f;
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        body.light .edit-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .arrow {
            font-size: 20px;
            color: #007aff;
            transition: transform 0.2s;
        }

        .project-row:hover .arrow {
            transform: translateX(4px);
        }

        .menu-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        body.light .menu-btn {
            background: rgba(0, 0, 0, 0.05);
        }

        body.light .menu-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .dropdown-menu {
            position: absolute;
            right: 32px;
            top: 70px;
            background: #2c2c2e;
            border-radius: 12px;
            padding: 8px;
            min-width: 160px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 10000;
            display: none;
        }

        .dropdown-menu.active {
            display: block;
        }

        body.light .dropdown-menu {
            background: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .dropdown-item {
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        body.light .dropdown-item:hover {
            background: #f5f5f7;
        }

        .dropdown-item.danger {
            color: #ff3b30;
        }

        .add-project-btn {
            width: 100%;
            padding: 18px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-project-btn:hover {
            background: #0051d5;
            transform: scale(1.01);
        }

        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #86868b;
            font-size: 17px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        body.light .modal-content {
            background: #fff;
        }

        .modal-content h2 {
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #86868b;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #f5f5f7;
            font-size: 15px;
            transition: all 0.2s;
        }

        body.light .form-group input {
            background: #f5f5f7;
            border-color: #d1d1d6;
            color: #1d1d1f;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007aff;
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0051d5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f5f5f7;
        }

        body.light .btn-secondary {
            background: #e5e5ea;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 40px;
            }
            .project-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .project-no {
                position: absolute;
                top: 28px;
                right: 32px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">Cube Architecture</div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>项目管理</h1>
            <p>Material Management System</p>
        </div>

        <div id="loading" class="loading">加载项目中...</div>
        <div id="projectsList" class="projects-list" style="display: none;"></div>
        <button class="add-project-btn" onclick="addProject()" style="display: none;" id="addBtn">+ 新增项目</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">新增项目</h2>
            <form id="projectForm" onsubmit="return false;">
                <div class="form-group">
                    <label>项目名称</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label>项目描述</label>
                    <input type="text" id="projectDesc">
                </div>
                <div class="form-group">
                    <label>项目编号</label>
                    <input type="text" id="projectNo" placeholder="例如: P001">
                </div>
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="projectDate">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary" onclick="saveProject()">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twvytxplhullonxkifba.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dnl0eHBsaHVsbG9ueGtpZmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTk0MjgsImV4cCI6MjA5MDAzNTQyOH0.5wVZin8TObqhDhrxZG3-31cmkh0erLrOT-tGxBNC1cQ';
        
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentEditId = null;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadProjects() {
            console.log('🔄 开始加载项目列表...');
            try {
                const { data, error } = await supabaseClient
                    .from('projects')
                    .select('*')
                    .order('sort_order', { ascending: true, nullsFirst: false })
                    .order('created_at', { ascending: false });

                if (error) throw error;

                console.log('📦 加载到', data.length, '个项目');

                const list = document.getElementById('projectsList');
                const loading = document.getElementById('loading');
                const addBtn = document.getElementById('addBtn');

                list.innerHTML = '';
                data.forEach(project => {
                    const row = document.createElement('div');
                    row.className = 'project-row';
                    row.onclick = (e) => {
                        if (!e.target.closest('.menu-btn') && !e.target.closest('.dropdown-menu')) {
                            openProject(project.id, project.name);
                        }
                    };

                    const projectId = project.id;
                    row.innerHTML = `
                        <div class="drag-handle" draggable="true">⋮⋮</div>
                        <div class="project-no">${escapeHtml(project.project_no || 'N/A')}</div>
                        <div class="project-info">
                            <h3>${escapeHtml(project.name)}</h3>
                            <p>${escapeHtml(project.description || '暂无描述')}</p>
                        </div>
                        <div class="project-date">${escapeHtml(project.start_date || '未设置日期')}</div>
                        <button class="menu-btn" data-project-id="${projectId}">⋯</button>
                        <div class="arrow">→</div>
                        <div class="dropdown-menu" id="menu-${projectId}">
                            <div class="dropdown-item" data-action="edit" data-project-id="${projectId}">✏️ 编辑项目</div>
                            <div class="dropdown-item danger" data-action="delete" data-project-id="${projectId}">🗑️ 删除项目</div>
                        </div>
                    `;

                    // 拖拽事件
                    const dragHandle = row.querySelector('.drag-handle');
                    row.draggable = true;

                    row.addEventListener('dragstart', (e) => {
                        if (e.target.closest('.drag-handle')) {
                            row.classList.add('dragging');
                            e.dataTransfer.effectAllowed = 'move';
                            e.dataTransfer.setData('text/plain', projectId);
                        } else {
                            e.preventDefault();
                        }
                    });

                    row.addEventListener('dragend', () => {
                        row.classList.remove('dragging');
                        document.querySelectorAll('.project-row').forEach(r => r.classList.remove('drag-over'));
                    });

                    row.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        const dragging = document.querySelector('.dragging');
                        if (dragging && dragging !== row) {
                            row.classList.add('drag-over');
                        }
                    });

                    row.addEventListener('dragleave', () => {
                        row.classList.remove('drag-over');
                    });

                    row.addEventListener('drop', async (e) => {
                        e.preventDefault();
                        row.classList.remove('drag-over');
                        const draggedId = e.dataTransfer.getData('text/plain');
                        if (draggedId && draggedId !== projectId) {
                            await swapProjects(draggedId, projectId);
                        }
                    });

                    // 绑定事件
                    row.querySelector('.menu-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleMenu(projectId);
                    });

                    row.querySelectorAll('.dropdown-item').forEach(item => {
                        item.addEventListener('click', (e) => {
                            e.stopPropagation();
                            closeAllMenus();
                            const action = item.dataset.action;
                            if (action === 'edit') {
                                editProject(projectId);
                            } else if (action === 'delete') {
                                deleteProject(projectId);
                            }
                        });
                    });

                    list.appendChild(row);
                });

                loading.style.display = 'none';
                list.style.display = 'flex';
                addBtn.style.display = 'block';

                console.log('✅ 项目列表渲染完成');
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('loading').textContent = '加载失败: ' + err.message;
            }
        }

        function openProject(projectId, projectName) {
            window.location.href = `material.html?project=${projectId}&name=${encodeURIComponent(projectName)}`;
        }

        function addProject() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = '新增项目';
            document.getElementById('projectName').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectNo').value = '';
            document.getElementById('projectDate').value = '';
            document.getElementById('modal').classList.add('active');
        }

        async function editProject(projectId) {
            try {
                const { data, error } = await supabaseClient
                    .from('projects')
                    .select('*')
                    .eq('id', projectId)
                    .single();

                if (error) throw error;

                currentEditId = projectId;
                document.getElementById('modalTitle').textContent = '编辑项目';
                document.getElementById('projectName').value = data.name || '';
                document.getElementById('projectDesc').value = data.description || '';
                document.getElementById('projectNo').value = data.project_no || '';
                document.getElementById('projectDate').value = data.start_date || '';
                document.getElementById('modal').classList.add('active');
            } catch (err) {
                alert('加载失败: ' + err.message);
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentEditId = null;
        }

        async function saveProject() {
            const name = document.getElementById('projectName').value.trim();
            if (!name) {
                alert('请输入项目名称');
                return;
            }

            const projectData = {
                name: name,
                description: document.getElementById('projectDesc').value.trim(),
                project_no: document.getElementById('projectNo').value.trim(),
                start_date: document.getElementById('projectDate').value || null
            };

            try {
                if (currentEditId) {
                    const { error } = await supabaseClient
                        .from('projects')
                        .update({ ...projectData, updated_at: new Date().toISOString() })
                        .eq('id', currentEditId);
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('projects')
                        .insert(projectData);
                    if (error) throw error;
                }
                closeModal();
                await loadProjects();
            } catch (err) {
                alert('保存失败: ' + err.message);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            document.querySelector('.theme-toggle').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        function toggleMenu(projectId) {
            const menu = document.getElementById(`menu-${projectId}`);
            const allMenus = document.querySelectorAll('.dropdown-menu');
            allMenus.forEach(m => {
                if (m.id !== `menu-${projectId}`) {
                    m.classList.remove('active');
                }
            });
            menu.classList.toggle('active');
        }

        function closeAllMenus() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
        }

        async function deleteProject(projectId) {
            console.log('删除项目 ID:', projectId, '类型:', typeof projectId);
            if (!confirm('确定要删除这个项目吗？删除后无法恢复！')) return;

            try {
                // 先删除项目关联的所有材料
                const { error: materialsError } = await supabaseClient
                    .from('materials')
                    .delete()
                    .eq('project_id', projectId);

                if (materialsError) {
                    console.error('删除材料失败:', materialsError);
                }

                // 再删除项目
                const { error } = await supabaseClient
                    .from('projects')
                    .delete()
                    .eq('id', projectId);

                if (error) throw error;

                console.log('✅ 项目已删除，准备刷新列表');
                window.location.reload();
            } catch (err) {
                console.error('❌ 删除失败:', err);
                alert('删除失败: ' + err.message);
            }
        }

        async function swapProjects(draggedId, targetId) {
            try {
                // 获取所有项目
                const { data: allProjects } = await supabaseClient
                    .from('projects')
                    .select('id, sort_order')
                    .order('sort_order', { ascending: true, nullsFirst: false })
                    .order('created_at', { ascending: false });

                if (!allProjects) return;

                // 找到拖拽项和目标项的索引
                const draggedIndex = allProjects.findIndex(p => p.id === draggedId);
                const targetIndex = allProjects.findIndex(p => p.id === targetId);

                if (draggedIndex === -1 || targetIndex === -1) return;

                // 重新排列数组
                const [draggedItem] = allProjects.splice(draggedIndex, 1);
                allProjects.splice(targetIndex, 0, draggedItem);

                // 更新所有项目的 sort_order
                const updates = allProjects.map((project, index) =>
                    supabaseClient
                        .from('projects')
                        .update({ sort_order: index })
                        .eq('id', project.id)
                );

                await Promise.all(updates);
                await loadProjects();
            } catch (err) {
                console.error('排序失败:', err);
            }
        }

        // 点击页面其他地方关闭菜单
        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
        });

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            document.querySelector('.theme-toggle').textContent = '🌙';
        }

        // 页面首次加载
        loadProjects();

        // 禁用往返缓存，强制每次都重新加载
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                console.log('检测到缓存恢复，强制重新加载页面');
                window.location.reload();
            }
        });
    </script>
</body>
</html>
