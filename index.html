<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目选择 - Cube Architecture</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 18px;
            color: #86868b;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .project-card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .project-no {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 12px;
            color: #86868b;
            background: #f5f5f7;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .project-card h3 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-right: 60px;
        }

        .project-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #86868b;
        }

        .project-card p {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 16px;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .project-card .arrow {
            font-size: 20px;
            color: #007aff;
        }

        .edit-btn {
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .edit-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .add-project-btn {
            width: 100%;
            padding: 16px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-project-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>材料管理系统</h1>
            <p>Cube Architecture</p>
        </div>

        <div id="loading" class="loading">加载项目中...</div>
        <div id="projectsGrid" class="projects-grid" style="display: none;"></div>
        <button class="add-project-btn" onclick="addProject()" style="display: none;" id="addBtn">+ 新增项目</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://twvytxplhullonxkifba.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dnl0eHBsaHVsbG9ueGtpZmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTk0MjgsImV4cCI6MjA5MDAzNTQyOH0.5wVZin8TObqhDhrxZG3-31cmkh0erLrOT-tGxBNC1cQ';
        
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProjects() {
            try {
                const { data, error } = await supabaseClient.from('projects').select('*');
                if (error) throw error;

                const grid = document.getElementById('projectsGrid');
                const loading = document.getElementById('loading');
                const addBtn = document.getElementById('addBtn');

                grid.innerHTML = data.map(project => `
                    <div class="project-card" onclick="openProject('${project.id}', '${project.name}')">
                        <div class="project-no">${project.project_no || 'N/A'}</div>
                        <h3>${project.name}</h3>
                        <div class="project-meta">
                            <span>📅 ${project.start_date || '未设置'}</span>
                        </div>
                        <p>${project.description || '点击进入项目'}</p>
                        <div class="project-actions">
                            <button class="edit-btn" onclick="event.stopPropagation(); editProject('${project.id}')">编辑</button>
                            <div class="arrow">→</div>
                        </div>
                    </div>
                `).join('');

                loading.style.display = 'none';
                grid.style.display = 'grid';
                addBtn.style.display = 'block';
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('loading').textContent = '加载失败: ' + err.message;
            }
        }

        function openProject(projectId, projectName) {
            window.location.href = `material.html?project=${projectId}&name=${encodeURIComponent(projectName)}`;
        }

        async function addProject() {
            const name = prompt('请输入项目名称：');
            if (name) {
                const description = prompt('请输入项目描述（可选）：');
                const projectNo = prompt('请输入项目编号（如 P001）：');
                const startDate = prompt('请输入开始日期（YYYY-MM-DD）：');
                try {
                    const { error } = await supabaseClient.from('projects').insert({
                        name: name,
                        description: description || '',
                        project_no: projectNo || null,
                        start_date: startDate || null
                    });
                    if (error) throw error;
                    loadProjects();
                } catch (err) {
                    alert('创建失败: ' + err.message);
                }
            }
        }

        async function editProject(projectId) {
            try {
                const { data, error } = await supabaseClient.from('projects').select('*').eq('id', projectId).single();
                if (error) throw error;

                const name = prompt('项目名称：', data.name);
                if (name === null) return;

                const description = prompt('项目描述：', data.description || '');
                const projectNo = prompt('项目编号：', data.project_no || '');
                const startDate = prompt('开始日期（YYYY-MM-DD）：', data.start_date || '');

                const { error: updateError } = await supabaseClient.from('projects').update({
                    name: name,
                    description: description,
                    project_no: projectNo,
                    start_date: startDate
                }).eq('id', projectId);

                if (updateError) throw updateError;
                loadProjects();
            } catch (err) {
                alert('编辑失败: ' + err.message);
            }
        }

        loadProjects();
    </script>
</body>
</html>
