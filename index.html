<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目选择 - Cube Architecture</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #f5f5f7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease;
        }

        body.light {
            background: #fff;
            color: #1d1d1f;
        }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        body.light .nav {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
        }

        .nav-brand {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .theme-toggle {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 40px 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 80px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 21px;
            color: #86868b;
            font-weight: 400;
        }

        body.light .hero p {
            color: #6e6e73;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        body.light .projects-list {
            background: rgba(0, 0, 0, 0.05);
        }

        .project-row {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 28px 32px;
            display: grid;
            grid-template-columns: 80px 1fr 140px 60px;
            gap: 24px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        body.light .project-row {
            background: #fff;
        }

        .project-row:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.005);
        }

        body.light .project-row:hover {
            background: #f5f5f7;
        }

        .project-no {
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            font-variant-numeric: tabular-nums;
        }

        .project-info h3 {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .project-info p {
            font-size: 14px;
            color: #86868b;
            line-height: 1.4;
        }

        body.light .project-info p {
            color: #6e6e73;
        }

        .project-date {
            font-size: 14px;
            color: #86868b;
            font-variant-numeric: tabular-nums;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .edit-btn {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            color: #f5f5f7;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        body.light .edit-btn {
            background: rgba(0, 0, 0, 0.05);
            color: #1d1d1f;
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        body.light .edit-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .arrow {
            font-size: 20px;
            color: #007aff;
            transition: transform 0.2s;
        }

        .project-row:hover .arrow {
            transform: translateX(4px);
        }

        .add-project-btn {
            width: 100%;
            padding: 18px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-project-btn:hover {
            background: #0051d5;
            transform: scale(1.01);
        }

        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #86868b;
            font-size: 17px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        body.light .modal-content {
            background: #fff;
        }

        .modal-content h2 {
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #86868b;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #f5f5f7;
            font-size: 15px;
            transition: all 0.2s;
        }

        body.light .form-group input {
            background: #f5f5f7;
            border-color: #d1d1d6;
            color: #1d1d1f;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007aff;
            background: rgba(255, 255, 255, 0.15);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0051d5;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #f5f5f7;
        }

        body.light .btn-secondary {
            background: #e5e5ea;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 40px;
            }
            .project-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .project-no {
                position: absolute;
                top: 28px;
                right: 32px;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">Cube Architecture</div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>项目管理</h1>
            <p>Material Management System</p>
        </div>

        <div id="loading" class="loading">加载项目中...</div>
        <div id="projectsList" class="projects-list" style="display: none;"></div>
        <button class="add-project-btn" onclick="addProject()" style="display: none;" id="addBtn">+ 新增项目</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">新增项目</h2>
            <form id="projectForm" onsubmit="return false;">
                <div class="form-group">
                    <label>项目名称</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label>项目描述</label>
                    <input type="text" id="projectDesc">
                </div>
                <div class="form-group">
                    <label>项目编号</label>
                    <input type="text" id="projectNo" placeholder="例如: P001">
                </div>
                <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="projectDate">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary" onclick="saveProject()">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twvytxplhullonxkifba.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dnl0eHBsaHVsbG9ueGtpZmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTk0MjgsImV4cCI6MjA5MDAzNTQyOH0.5wVZin8TObqhDhrxZG3-31cmkh0erLrOT-tGxBNC1cQ';
        
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentEditId = null;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadProjects() {
            try {
                const { data, error } = await supabaseClient
                    .from('projects')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const list = document.getElementById('projectsList');
                const loading = document.getElementById('loading');
                const addBtn = document.getElementById('addBtn');

                list.innerHTML = '';
                data.forEach(project => {
                    const row = document.createElement('div');
                    row.className = 'project-row';
                    row.onclick = () => openProject(project.id, project.name);

                    row.innerHTML = `
                        <div class="project-no">${escapeHtml(project.project_no || 'N/A')}</div>
                        <div class="project-info">
                            <h3>${escapeHtml(project.name)}</h3>
                            <p>${escapeHtml(project.description || '暂无描述')}</p>
                        </div>
                        <div class="project-date">${escapeHtml(project.start_date || '未设置日期')}</div>
                        <div class="arrow">→</div>
                    `;

                    list.appendChild(row);
                });

                loading.style.display = 'none';
                list.style.display = 'flex';
                addBtn.style.display = 'block';
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('loading').textContent = '加载失败: ' + err.message;
            }
        }

        function openProject(projectId, projectName) {
            window.location.href = `material.html?project=${projectId}&name=${encodeURIComponent(projectName)}`;
        }

        function addProject() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = '新增项目';
            document.getElementById('projectName').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectNo').value = '';
            document.getElementById('projectDate').value = '';
            document.getElementById('modal').classList.add('active');
        }

        async function editProject(projectId) {
            try {
                const { data, error } = await supabaseClient
                    .from('projects')
                    .select('*')
                    .eq('id', projectId)
                    .single();

                if (error) throw error;

                currentEditId = projectId;
                document.getElementById('modalTitle').textContent = '编辑项目';
                document.getElementById('projectName').value = data.name || '';
                document.getElementById('projectDesc').value = data.description || '';
                document.getElementById('projectNo').value = data.project_no || '';
                document.getElementById('projectDate').value = data.start_date || '';
                document.getElementById('modal').classList.add('active');
            } catch (err) {
                alert('加载失败: ' + err.message);
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentEditId = null;
        }

        async function saveProject() {
            const name = document.getElementById('projectName').value.trim();
            if (!name) {
                alert('请输入项目名称');
                return;
            }

            const projectData = {
                name: name,
                description: document.getElementById('projectDesc').value.trim(),
                project_no: document.getElementById('projectNo').value.trim(),
                start_date: document.getElementById('projectDate').value || null
            };

            try {
                if (currentEditId) {
                    const { error } = await supabaseClient
                        .from('projects')
                        .update({ ...projectData, updated_at: new Date().toISOString() })
                        .eq('id', currentEditId);
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('projects')
                        .insert(projectData);
                    if (error) throw error;
                }
                closeModal();
                await loadProjects();
            } catch (err) {
                alert('保存失败: ' + err.message);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            document.querySelector('.theme-toggle').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            document.querySelector('.theme-toggle').textContent = '🌙';
        }

        // 页面首次加载
        loadProjects();

        // 当页面可见性改变时（从其他标签页或页面返回），重新加载数据
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                console.log('页面变为可见，刷新项目列表');
                loadProjects();
            }
        });

        // 当页面从往返缓存恢复时，重新加载数据
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                console.log('页面从缓存恢复，刷新项目列表');
                loadProjects();
            }
        });
    </script>
</body>
</html>
